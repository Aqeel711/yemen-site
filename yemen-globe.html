<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yemen — Interactive Globe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #030612;
    color: #fff;
    font-family: 'Georgia', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
  }

  canvas { display: block; }

  /* Top title */
  #title {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 1s ease;
  }
  #title.visible { opacity: 1; }
  #title h1 {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #e8d5a0;
  }
  #title p {
    font-size: 12px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Yemen label */
  #yemen-label {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.5s;
    transform: translate(-50%, -110%);
  }
  #yemen-label.visible { opacity: 1; }
  #yemen-label .dot {
    width: 10px; height: 10px;
    background: #e8d5a0;
    border-radius: 50%;
    box-shadow: 0 0 14px 4px rgba(232,213,160,0.6);
    margin: 0 auto 6px;
    animation: pulse 2s infinite;
  }
  #yemen-label span {
    display: block;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #e8d5a0;
    text-align: center;
    white-space: nowrap;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px 2px rgba(232,213,160,0.5); }
    50% { box-shadow: 0 0 20px 8px rgba(232,213,160,0.8); }
  }

  /* Upload panel */
  #upload-panel {
    position: fixed;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 30;
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    transition: opacity 1s 1s ease;
  }
  #upload-panel.visible { opacity: 1; }

  #upload-btn {
    background: rgba(232,213,160,0.08);
    border: 1px solid rgba(232,213,160,0.3);
    border-radius: 8px;
    padding: 14px 18px;
    cursor: pointer;
    color: #e8d5a0;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
    width: 140px;
  }
  #upload-btn:hover {
    background: rgba(232,213,160,0.15);
    border-color: rgba(232,213,160,0.6);
  }
  #upload-btn .icon { font-size: 20px; display: block; margin-bottom: 6px; }

  #file-input { display: none; }

  /* Image gallery on globe */
  .img-pin {
    position: fixed;
    z-index: 25;
    pointer-events: all;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .img-pin:hover { transform: translate(-50%, -50%) scale(1.08); }
  .img-pin .frame {
    width: 80px; height: 80px;
    border: 2px solid rgba(232,213,160,0.6);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(232,213,160,0.1);
    transform: translate(-50%, -50%);
  }
  .img-pin .frame img { width: 100%; height: 100%; object-fit: cover; }
  .img-pin .thread {
    width: 1px;
    background: linear-gradient(to bottom, rgba(232,213,160,0.5), transparent);
    margin: 0 auto;
    transform: translateX(-50%) translateX(50%);
  }

  /* Lightbox */
  #lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 80vw;
    max-height: 80vh;
    border-radius: 8px;
    box-shadow: 0 0 80px rgba(0,0,0,0.8);
    border: 1px solid rgba(255,255,255,0.1);
  }
  #lightbox-close {
    position: absolute;
    top: 24px; right: 32px;
    font-size: 28px;
    cursor: pointer;
    color: rgba(255,255,255,0.5);
    transition: color 0.2s;
    background: none;
    border: none;
    line-height: 1;
  }
  #lightbox-close:hover { color: #fff; }

  /* Controls hint */
  #hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="title">
  <h1>اليمن · Yemen</h1>
  <p>15.55°N · 48.52°E · Arabian Peninsula</p>
</div>

<div id="yemen-label">
  <div class="dot"></div>
  <span>Yemen</span>
</div>

<div id="upload-panel">
  <label id="upload-btn" for="file-input">
    <span class="icon">＋</span>
    Add Image
  </label>
  <input type="file" id="file-input" accept="image/*" multiple>
</div>

<div id="hint">Drag to rotate · Scroll to zoom</div>

<div id="lightbox">
  <button id="lightbox-close">✕</button>
  <img id="lightbox-img" alt="">
</div>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
const YEMEN_LAT = 15.5527; // degrees N
const YEMEN_LON = 48.5164; // degrees E

// ── Scene setup ──────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 1000);
camera.position.set(0, 0, 4.5);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.5;
controls.maxDistance = 8;
controls.autoRotate = false;

// ── Starfield ────────────────────────────────────────────────────
const starsGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 400;
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, sizeAttenuation: true });
scene.add(new THREE.Points(starsGeo, starsMat));

// ── Lights ───────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);
const sunLight = new THREE.DirectionalLight(0xfff5e0, 2.8);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);

// ── Earth globe ──────────────────────────────────────────────────
const earthGeo = new THREE.SphereGeometry(1, 64, 64);

// Load earth texture from reliable CDN
const textureLoader = new THREE.TextureLoader();

// Use a reliable earth texture
const earthMat = new THREE.MeshPhongMaterial({
  color: 0x2266aa,
  specular: new THREE.Color(0x224466),
  shininess: 25,
});

// Attempt to load a real texture
const earthTexURL = 'https://cdn.jsdelivr.net/npm/three-globe@2.30.0/example/img/earth-blue-marble.jpg';
const bumpURL = 'https://cdn.jsdelivr.net/npm/three-globe@2.30.0/example/img/earth-topology.png';

textureLoader.load(earthTexURL, (tex) => {
  earthMat.map = tex;
  earthMat.needsUpdate = true;
});
textureLoader.load(bumpURL, (bump) => {
  earthMat.bumpMap = bump;
  earthMat.bumpScale = 0.04;
  earthMat.needsUpdate = true;
});

const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// ── Atmosphere glow ───────────────────────────────────────────────
const atmosGeo = new THREE.SphereGeometry(1.025, 64, 64);
const atmosMat = new THREE.MeshPhongMaterial({
  color: 0x3399ff,
  transparent: true,
  opacity: 0.08,
  side: THREE.FrontSide,
});
scene.add(new THREE.Mesh(atmosGeo, atmosMat));

// Outer glow
const glowGeo = new THREE.SphereGeometry(1.08, 64, 64);
const glowMat = new THREE.MeshPhongMaterial({
  color: 0x224488,
  transparent: true,
  opacity: 0.04,
  side: THREE.BackSide,
});
scene.add(new THREE.Mesh(glowGeo, glowMat));

// ── Yemen marker ─────────────────────────────────────────────────
function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

const yemenPos = latLonToVec3(YEMEN_LAT, YEMEN_LON, 1.012);

// Glowing dot
const dotGeo = new THREE.SphereGeometry(0.012, 16, 16);
const dotMat = new THREE.MeshBasicMaterial({ color: 0xe8d5a0 });
const dot = new THREE.Mesh(dotGeo, dotMat);
dot.position.copy(yemenPos);
earth.add(dot);

// Ripple ring
const ringGeo = new THREE.RingGeometry(0.018, 0.024, 32);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0xe8d5a0, transparent: true, opacity: 0.7, side: THREE.DoubleSide
});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.position.copy(yemenPos);
ring.lookAt(yemenPos.clone().multiplyScalar(2));
earth.add(ring);

// ── Camera animation: zoom to Yemen ──────────────────────────────
// Yemen on the globe is at yemenPos in world space (but rotated with earth)
// We'll set earth rotation so Yemen faces camera, then animate zoom

// Compute rotation to face Yemen
// Yemen lon: 48.5 → earth Y rotation = -(lon) in radians
const targetEarthRotY = -YEMEN_LON * (Math.PI / 180);
const targetEarthRotX = YEMEN_LAT * (Math.PI / 180) * 0.3;

// Start with a wide view, then animate in
let animPhase = 'intro'; // 'intro' -> 'arrive' -> 'idle'
let animT = 0;
const INTRO_DUR = 3.0;  // seconds
const ARRIVE_DUR = 2.2;

camera.position.set(0, 1, 8);
earth.rotation.y = 2.5; // start rotated away

function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

let clock = new THREE.Clock();
let labelVisible = false;
let panelVisible = false;

const title = document.getElementById('title');
const yemenLabel = document.getElementById('yemen-label');
const uploadPanel = document.getElementById('upload-panel');

// ── Image pins ────────────────────────────────────────────────────
const pins = []; // { el, lat, lon, threadH }

function addImagePin(src, lat, lon) {
  const el = document.createElement('div');
  el.className = 'img-pin';
  const frame = document.createElement('div');
  frame.className = 'frame';
  const img = document.createElement('img');
  img.src = src;
  frame.appendChild(img);
  el.appendChild(frame);
  document.body.appendChild(el);

  // Click to open lightbox
  el.addEventListener('click', () => {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  });

  const jitter = (Math.random() - 0.5) * 4;
  pins.push({ el, lat: lat + jitter, lon: lon + jitter });
}

// ── Project 3D point to screen ────────────────────────────────────
function projectToScreen(vec3World) {
  const v = vec3World.clone().project(camera);
  return {
    x: (v.x * 0.5 + 0.5) * window.innerWidth,
    y: (-v.y * 0.5 + 0.5) * window.innerHeight,
    visible: v.z < 1
  };
}

// ── Animate ───────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  animT += delta;

  if (animPhase === 'intro') {
    const t = Math.min(animT / INTRO_DUR, 1);
    const e = easeInOutCubic(t);
    // Rotate earth toward Yemen
    earth.rotation.y = 2.5 + (targetEarthRotY - 2.5) * e;
    // Zoom camera in
    camera.position.z = 8 - (8 - 3.2) * e;
    camera.position.y = 1 - 1 * e;
    if (t >= 1) { animPhase = 'arrive'; animT = 0; title.classList.add('visible'); }

  } else if (animPhase === 'arrive') {
    const t = Math.min(animT / ARRIVE_DUR, 1);
    const e = easeInOutCubic(t);
    camera.position.z = 3.2 - (3.2 - 2.2) * e;
    if (t >= 1) {
      animPhase = 'idle';
      controls.enabled = true;
      yemenLabel.classList.add('visible');
      uploadPanel.classList.add('visible');
    }

  } else {
    controls.update();
    // slow auto-drift
    if (!controls.isDragging) {
      // subtle wobble
    }
  }

  // Update ring pulse
  const pulse = 0.7 + 0.3 * Math.sin(clock.getElapsedTime() * 3);
  ringMat.opacity = pulse * 0.8;
  const scale = 1 + 0.15 * Math.sin(clock.getElapsedTime() * 3);
  ring.scale.set(scale, scale, 1);

  // Update Yemen label position
  const yemenWorld = yemenPos.clone().applyMatrix4(earth.matrixWorld);
  const screen = projectToScreen(yemenWorld);
  if (screen.visible) {
    yemenLabel.style.left = screen.x + 'px';
    yemenLabel.style.top = (screen.y - 14) + 'px';
  }

  // Update image pin positions
  pins.forEach(pin => {
    const pos3d = latLonToVec3(pin.lat, pin.lon, 1.03);
    const world = pos3d.clone().applyMatrix4(earth.matrixWorld);
    const s = projectToScreen(world);
    const frontFace = world.clone().normalize().dot(camera.position.clone().normalize()) > 0;
    pin.el.style.display = (s.visible && frontFace) ? 'block' : 'none';
    pin.el.style.left = s.x + 'px';
    pin.el.style.top = s.y + 'px';
  });

  renderer.render(scene, camera);
}

controls.enabled = false;
animate();

// ── File input ────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(file => {
    const url = URL.createObjectURL(file);
    // Spread images slightly around Yemen
    const jitterLat = (Math.random() - 0.5) * 3;
    const jitterLon = (Math.random() - 0.5) * 3;
    addImagePin(url, YEMEN_LAT + jitterLat, YEMEN_LON + jitterLon);
  });
  e.target.value = '';
});

// ── Drag & drop ───────────────────────────────────────────────────
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault();
  Array.from(e.dataTransfer.files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const url = URL.createObjectURL(file);
    const jitterLat = (Math.random() - 0.5) * 3;
    const jitterLon = (Math.random() - 0.5) * 3;
    addImagePin(url, YEMEN_LAT + jitterLat, YEMEN_LON + jitterLon);
  });
});

// ── Lightbox close ────────────────────────────────────────────────
document.getElementById('lightbox-close').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// ── Resize ────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
